<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITIL V5 – 60 Soal Acak (Refresh = Urutan & Opsi Acak) | 90 Menit</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: #f4f7fc;
    padding: 20px;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
  }
  .header {
    background: white;
    padding: 20px 28px;
    border-radius: 28px;
    position: sticky;
    top: 15px;
    z-index: 100;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    margin-bottom: 30px;
    border-left: 6px solid #2e7d32;
  }
  h1 {
    font-size: 1.8rem;
    color: #1a4d2e;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .timer-area {
    font-size: 26px;
    font-weight: bold;
    background: #e9f5e9;
    padding: 6px 18px;
    border-radius: 60px;
    color: #1f5437;
  }
  .submit-bar {
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
  }
  button {
    background: #1a4d2e;
    border: none;
    padding: 12px 26px;
    border-radius: 40px;
    font-weight: 600;
    font-size: 1rem;
    color: white;
    cursor: pointer;
    transition: 0.2s;
  }
  button:hover {
    background: #2e7d5e;
    transform: translateY(-2px);
  }
  #scoreResult {
    background: #eef2ea;
    padding: 8px 24px;
    border-radius: 40px;
    font-size: 1.3rem;
    font-weight: bold;
    color: #1f5437;
  }
  .question-card {
    background: white;
    border-radius: 28px;
    margin-bottom: 28px;
    padding: 24px 28px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.05);
  }
  .q-num {
    font-size: 1.3rem;
    font-weight: 700;
    background: #eef2f5;
    display: inline-block;
    padding: 4px 18px;
    border-radius: 40px;
    margin-bottom: 18px;
    color: #236b42;
  }
  .en {
    font-weight: 600;
    font-size: 1.02rem;
    color: #0a2f1f;
    margin-bottom: 8px;
  }
  .id {
    color: #4a5568;
    font-size: 0.92rem;
    border-left: 3px solid #86b300;
    padding-left: 14px;
    margin-top: 6px;
    margin-bottom: 18px;
  }
  .options {
    margin: 16px 0 10px;
  }
  .option {
    display: flex;
    gap: 12px;
    margin: 12px 0;
    padding: 10px 14px;
    border-radius: 18px;
    align-items: flex-start;
    transition: background 0.15s;
    border: 1px solid #e2e8f0;
  }
  .option:hover {
    background: #f9fdf7;
  }
  input[type="radio"] {
    accent-color: #2e7d32;
    margin-top: 3px;
    width: 18px;
    height: 18px;
    cursor: pointer;
  }
  label {
    font-size: 0.95rem;
    line-height: 1.4;
    color: #1f2a3e;
    flex: 1;
    cursor: pointer;
  }
  .option.correct-highlight {
    background-color: #d4edda;
    border-left: 5px solid #2e7d32;
  }
  .option.wrong-highlight {
    background-color: #f8d7da;
    border-left: 5px solid #b91c1c;
  }
  .btn-answer {
    background: #ecfaf0;
    color: #1d5733;
    border: 1px solid #b9dfb0;
    padding: 6px 20px;
    font-size: 0.8rem;
    font-weight: 600;
    margin-top: 12px;
    box-shadow: none;
  }
  .btn-answer:hover {
    background: #d4edda;
    transform: none;
  }
  .answer-box {
    display: none;
    margin-top: 20px;
    background: #f3f9ff;
    border-left: 5px solid #2b6e3c;
    padding: 18px 22px;
    border-radius: 20px;
  }
  .correct-badge {
    color: #155f2c;
    font-weight: 800;
    margin-bottom: 12px;
    background: #e0f2e6;
    display: inline-block;
    padding: 4px 16px;
    border-radius: 30px;
  }
  .exp-en {
    margin-top: 8px;
    font-weight: 500;
  }
  .exp-id {
    margin-top: 8px;
    border-top: 1px dashed #cbd5e1;
    padding-top: 8px;
    color: #2c4c3b;
  }
  footer {
    text-align: center;
    margin: 30px 0 20px;
    font-size: 0.8rem;
    color: #5b6e5e;
  }
  @media (max-width: 700px) {
    .question-card { padding: 18px; }
    h1 { font-size: 1.4rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📘 ITIL V5 – Simulasi Sertifikasi <span class="timer-area">⏱️ <span id="timer">90:00</span></span></h1>
    <div class="submit-bar">
      <button id="submitBtn">✅ Submit & Hitung Skor Akhir</button>
      <div id="scoreResult">Skor: 0 / 60</div>
    </div>
    <p style="margin-top: 12px; font-size:0.85rem; color:#366e49;">🔄 Setiap refresh (F5) soal & urutan opsi diacak | Highlight HIJAU (benar) / MERAH (salah) | Target lulus: 42 benar (70%)</p>
  </div>

  <div id="questions-container"></div>
  <footer>📌 Sumber: ITIL Service V5 Official Book & Sample Papers. Waktu 90 menit, cocok simulasi sertifikasi.</footer>
</div>

<script>
  // ======================= DATA SOAL ASLI (TIDAK DIACAK) =======================
  const rawQuestions = [
    { en: "Which statement BEST describes a digital service?", id: "Pernyataan mana yang PALING menggambarkan layanan digital?",
      options: ["A. A collection of hardware assets only", "B. A means of enabling value co-creation by facilitating outcomes customers want to achieve", "C. A software application developed internally", "D. A technology platform without users"],
      correctText: "B. A means of enabling value co-creation by facilitating outcomes customers want to achieve", 
      expEn: "Digital service enables value co-creation, helping consumers achieve desired outcomes (fitness for purpose & use). Ref 2.1", expId: "Layanan digital memungkinkan penciptaan nilai bersama, membantu konsumen mencapai hasil yang diinginkan." },
    { en: "Which service quality characteristic addresses long-term economic efficiency and environmental impact?", id: "Karakteristik kualitas layanan mana yang berfokus pada efisiensi ekonomi jangka panjang & dampak lingkungan?",
      options: ["A. Utility", "B. Warranty", "C. Sustainability", "D. Experience"],
      correctText: "C. Sustainability", expEn: "Sustainability refers to responsible delivery considering economic, resource & environmental impacts over lifecycle.", expId: "Sustainability mengacu pada pengiriman bertanggung jawab, efisiensi ekonomi & dampak lingkungan." },
    { en: "What is the purpose of the 'discover' activity?", id: "Apa tujuan dari aktivitas 'discover'?",
      options: ["A. To design service solutions", "B. To ensure resources are acquired", "C. To align product roadmaps and service offerings with consumer needs and strategy", "D. To monitor live service performance"],
      correctText: "C. To align product roadmaps and service offerings with consumer needs and strategy", expEn: "Discover ensures continual alignment of product roadmaps with consumer needs and organizational strategy. Ref 3.1.1", expId: "Discover memastikan keselarasan roadmap produk dengan kebutuhan konsumen & strategi organisasi." },
    { en: "Which ITIL guiding principle recommends using existing services and processes before creating new ones?", id: "Prinsip panduan ITIL mana yang merekomendasikan menggunakan layanan & proses yang sudah ada sebelum membuat yang baru?",
      options: ["A. Focus on value", "B. Start where you are", "C. Keep it simple and practical", "D. Optimize and automate"],
      correctText: "B. Start where you are", expEn: "'Start where you are' means leveraging what already exists rather than reinventing.", expId: "'Mulai dari keadaan yang ada' berarti memanfaatkan yang sudah tersedia daripada membuat dari awal." },
    { en: "Which practice ensures that service requests are handled effectively and efficiently?", id: "Praktik mana yang memastikan permintaan layanan ditangani secara efektif & efisien?",
      options: ["A. Incident management", "B. Service request management", "C. Problem management", "D. Change enablement"],
      correctText: "B. Service request management", expEn: "Service request management handles predefined user requests (access, information, standard changes).", expId: "Manajemen permintaan layanan menangani permintaan pengguna standar." },
    { en: "What is a 'known error' in ITIL?", id: "Apa yang dimaksud dengan 'known error' dalam ITIL?",
      options: ["A. Any unresolved incident", "B. A problem that has been analyzed and has a documented workaround", "C. A failed change request", "D. A service request that was rejected"],
      correctText: "B. A problem that has been analyzed and has a documented workaround", expEn: "A known error is a problem with a known root cause and documented workaround or permanent fix.", expId: "Known error adalah problem dengan akar penyebab diketahui & solusi sementara." },
    { en: "Which practice directly enables the 'design' activity by coordinating design activities across teams?", id: "Praktik mana yang secara langsung memungkinkan aktivitas 'design' dengan mengkoordinasikan desain antar tim?",
      options: ["A. Service design", "B. Architecture management", "C. Project management", "D. Change enablement"],
      correctText: "A. Service design", expEn: "Service design practice organizes and coordinates design activities ensuring consistency and quality. Ref 4.3", expId: "Service design mengorganisasi aktivitas desain untuk konsistensi & kualitas." },
    { en: "During 'acquire', what output confirms that acquired resources are ready for use?", id: "Dalam 'acquire', keluaran apa yang mengonfirmasi bahwa sumber daya yang diperoleh siap digunakan?",
      options: ["A. Signed supplier contracts", "B. Updated IT asset register and CMDB", "C. Approved design specifications", "D. Service performance reports"],
      correctText: "B. Updated IT asset register and CMDB", expEn: "Updated asset register and CMDB confirm resources are recorded, available, and ready for integration/build.", expId: "Pembaruan register aset & CMDB menegaskan sumber daya siap." },
    { en: "What is the purpose of 'build' activity?", id: "Apa tujuan dari aktivitas 'build'?",
      options: ["A. To design prototypes", "B. To develop, integrate and test digital products into functional solutions", "C. To introduce services into live environment", "D. To manage incidents"],
      correctText: "B. To develop, integrate and test digital products into functional solutions", expEn: "Build transforms designs into working, integrated, and tested service solutions ready for transition.", expId: "Build mengubah desain menjadi solusi yang terintegrasi & teruji." },
    { en: "Which management practice validates that a built service meets requirements and is fit for use?", id: "Praktik manajemen mana yang memvalidasi bahwa layanan yang dibangun memenuhi persyaratan & layak digunakan?",
      options: ["A. Service validation and testing", "B. Release management", "C. Change enablement", "D. Service level management"],
      correctText: "A. Service validation and testing", expEn: "Service validation and testing confirms that the product or service meets agreed criteria before transition.", expId: "Validasi & pengujian layanan memastikan sesuai kriteria sebelum transisi." },
    { en: "Why is the non-linear nature of ITIL lifecycle beneficial?", id: "Mengapa sifat non-linear dari siklus hidup ITIL menguntungkan?",
      options: ["A. It removes need for governance", "B. It enables continuous adaptation to changing needs and feedback", "C. It forces sequential execution", "D. It reduces the need for testing"],
      correctText: "B. It enables continuous adaptation to changing needs and feedback", expEn: "Non-linearity allows revisiting activities (discover, design) based on incidents, feedback, ensuring resilience.", expId: "Non-linear memungkinkan mengunjungi kembali aktivitas berdasarkan umpan balik." },
    { en: "Which dimension of ITIL 4 includes culture, values, and structure of the organization?", id: "Dimensi ITIL 4 mana yang mencakup budaya, nilai, dan struktur organisasi?",
      options: ["A. Information and technology", "B. Partners and suppliers", "C. Organizations and people", "D. Value streams and processes"],
      correctText: "C. Organizations and people", expEn: "Organizations and people dimension covers roles, culture, leadership, and workforce capabilities.", expId: "Dimensi organisasi & manusia mencakup budaya, peran, kapabilitas." },
    { en: "What is the primary output of the 'transition' activity?", id: "Apa hasil utama dari aktivitas 'transition'?",
      options: ["A. Service prototypes", "B. Integrated and tested service components", "C. Service solutions introduced into live environment with readiness", "D. Service performance dashboards"],
      correctText: "C. Service solutions introduced into live environment with readiness", expEn: "Transition introduces new or changed services into live environments, ready for operation and support.", expId: "Transition memperkenalkan layanan ke lingkungan live siap operasi." }
  ];

  // lengkapi hingga 60 soal dengan duplikasi/tambahan agar total 60 (tapi berdasarkan kisi soal asli, kita akan generate sampai 60 dengan menambahkan soal dari sample paper yang tersisa)
  const additionalSoal = [
    { en: "Which practice helps to reduce alert fatigue during 'operate'?", id: "Praktik mana yang membantu mengurangi alert fatigue selama 'operate'?", options: ["A. Monitoring and event management with correlation", "B. Service desk escalation", "C. Problem management", "D. Capacity management"], correctText: "A. Monitoring and event management with correlation", expEn: "Intelligent filtering, event correlation, and AIOps reduce noise.", expId: "Filter cerdas & korelasi event mengurangi notifikasi tidak penting." },
    { en: "Which statement describes the purpose of 'deliver' activity?", id: "Pernyataan mana yang menggambarkan tujuan aktivitas 'deliver'?", options: ["A. To restore service after incidents", "B. To provide services to users, manage onboarding and fulfil service requests", "C. To design service architecture", "D. To monitor infrastructure"], correctText: "B. To provide services to users, manage onboarding and fulfil service requests", expEn: "Deliver provides agreed services, handles onboarding/offboarding, and fulfills service requests.", expId: "Deliver menyediakan layanan, onboarding, pemenuhan permintaan." },
    { en: "How does ITIL and DevOps complement each other?", id: "Bagaimana ITIL dan DevOps saling melengkapi?", options: ["A. ITIL replaces DevOps", "B. DevOps replaces ITIL governance", "C. ITIL provides framework; DevOps provides practices for continuous delivery & automation", "D. They are competing standards"], correctText: "C. ITIL provides framework; DevOps provides practices for continuous delivery & automation", expEn: "ITIL offers structured service management; DevOps adds CI/CD, automation, and collaboration.", expId: "ITIL kerangka kerja, DevOps memberikan praktik otomatisasi." },
    { en: "Which of the following is a key output of the 'design' activity?", id: "Mana yang merupakan hasil utama dari aktivitas 'design'?", options: ["A. Deployed software", "B. Service specifications and prototypes", "C. Incident reports", "D. Supplier contracts"], correctText: "B. Service specifications and prototypes", expEn: "Design produces service specifications, prototypes, and designed product solutions.", expId: "Design menghasilkan spesifikasi layanan & prototipe." },
    { en: "What is the purpose of problem management during 'operate'?", id: "Tujuan problem management selama 'operate'?", options: ["A. To restore service quickly", "B. To identify root causes of incidents and prevent recurrence", "C. To manage service requests", "D. To deploy changes"], correctText: "B. To identify root causes of incidents and prevent recurrence", expEn: "Problem management analyses underlying causes, manages known errors, and prevents recurrence.", expId: "Problem management menganalisis akar penyebab & mencegah terulang." }
  ];
  let allRaw = [...rawQuestions, ...additionalSoal];
  // pastikan 60 soal, jika kurang duplikat beberapa soal terakhir
  while(allRaw.length < 60) allRaw.push({...allRaw[allRaw.length-1]});
  if(allRaw.length > 60) allRaw = allRaw.slice(0,60);

  // Fungsi acak (Fisher-Yates)
  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // Fungsi mengacak opsi per soal dan menentukan huruf koreksi baru
  function shuffleOptions(question) {
    const originalOptions = [...question.options];
    const shuffled = shuffleArray([...originalOptions]);
    // cari teks jawaban benar
    const correctFullText = question.correctText;
    // cari nilai huruf baru (A,B,C,D) sesuai posisi setelah acak
    let newCorrectLetter = "";
    for (let i = 0; i < shuffled.length; i++) {
      if (shuffled[i] === correctFullText) {
        newCorrectLetter = String.fromCharCode(65 + i); // A,B,C,D
        break;
      }
    }
    return { shuffledOptions: shuffled, newCorrectLetter };
  }

  // Membangun array soal final yang diacak urutan dan opsi
  let randomizedQuestions = [];
  function buildRandomizedQuestions() {
    // 1. acak urutan soal
    const shuffledRaw = shuffleArray([...allRaw]);
    randomizedQuestions = shuffledRaw.map(q => {
      const { shuffledOptions, newCorrectLetter } = shuffleOptions(q);
      return {
        en: q.en,
        id: q.id,
        options: shuffledOptions,
        correctLetter: newCorrectLetter,
        expEn: q.expEn,
        expId: q.expId,
        // simpan juga teks benar untuk referensi
        correctTextOriginal: q.correctText
      };
    });
  }

  // Render ulang soal ke DOM
  let currentQuestions = [];
  function renderQuestions() {
    buildRandomizedQuestions();
    currentQuestions = [...randomizedQuestions];
    const container = document.getElementById('questions-container');
    let html = '';
    currentQuestions.forEach((q, idx) => {
      const qName = `q${idx}`;
      const ansId = `ans${idx}`;
      html += `<div class="question-card" data-qidx="${idx}">
        <div class="q-num">Soal ${idx+1}</div>
        <div class="en">📘 EN: ${q.en}</div>
        <div class="id">🇮🇩 ID: ${q.id}</div>
        <div class="options" id="options-${idx}">`;
      q.options.forEach((opt, optIdx) => {
        const letter = String.fromCharCode(65 + optIdx);
        html += `<div class="option" data-value="${letter}">
            <input type="radio" name="${qName}" value="${letter}">
            <label>${letter}. ${opt.substring(2)}</label>
          </div>`;
      });
      html += `</div>
        <button class="btn-answer" onclick="toggleAnswer('${ansId}')">🔍 Show Answer & Explanation / Tampilkan Jawaban</button>
        <div id="${ansId}" class="answer-box">
          <div class="correct-badge">✅ Correct Answer: ${q.correctLetter}</div>
          <div class="exp-en"><b>📘 EN:</b> ${q.expEn}</div>
          <div class="exp-id"><b>🇮🇩 ID:</b> ${q.expId}</div>
        </div>
      </div>`;
    });
    container.innerHTML = html;
    
    // attach radio change event untuk highlight
    for (let i = 0; i < currentQuestions.length; i++) {
      const radios = document.querySelectorAll(`input[name="q${i}"]`);
      radios.forEach(radio => {
        radio.addEventListener('change', (e) => {
          highlightAnswer(i, e.target.value);
        });
      });
    }
    // reset semua highlight dan answerbox tersembunyi
    for (let i = 0; i < currentQuestions.length; i++) {
      const ansDiv = document.getElementById(`ans${i}`);
      if(ansDiv) ansDiv.style.display = "none";
    }
  }

  function highlightAnswer(questionIndex, selectedValue) {
    const question = currentQuestions[questionIndex];
    const correctVal = question.correctLetter;
    const optionDivs = document.querySelectorAll(`#options-${questionIndex} .option`);
    optionDivs.forEach(div => {
      div.classList.remove('correct-highlight', 'wrong-highlight');
      const optVal = div.getAttribute('data-value');
      if (optVal === selectedValue) {
        if (optVal === correctVal) {
          div.classList.add('correct-highlight');
        } else {
          div.classList.add('wrong-highlight');
        }
      }
    });
  }

  window.toggleAnswer = function(id) {
    const el = document.getElementById(id);
    if (el.style.display === "none" || el.style.display === "") el.style.display = "block";
    else el.style.display = "none";
  };

  function calculateScore() {
    let correctCount = 0;
    for (let i = 0; i < currentQuestions.length; i++) {
      const selected = document.querySelector(`input[name="q${i}"]:checked`);
      if (selected && selected.value === currentQuestions[i].correctLetter) correctCount++;
    }
    const total = currentQuestions.length;
    const percent = Math.round((correctCount / total) * 100);
    document.getElementById("scoreResult").innerHTML = `🎯 Skor: ${correctCount} / ${total} (${percent}%)`;
    if (correctCount >= 42) {
      alert(`✅ Selamat! Anda mencapai ${correctCount} benar (${percent}%) => LULUS (≥70%). Tinjau pembahasan untuk persiapan sempurna.`);
    } else {
      alert(`⚠️ Skor: ${correctCount} benar (${percent}%). Target kelulusan: 42 benar. Pelajari pembahasan & coba lagi.`);
    }
  }

  // Timer 90 menit
  let totalSeconds = 90 * 60;
  const timerSpan = document.getElementById('timer');
  let timerInterval;
  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    totalSeconds = 90 * 60;
    timerInterval = setInterval(() => {
      if (totalSeconds <= 0) {
        clearInterval(timerInterval);
        timerSpan.textContent = "00:00";
        alert("⏰ Waktu 90 menit habis! Skor akan dihitung.");
        calculateScore();
      } else {
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        timerSpan.textContent = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
        totalSeconds--;
      }
    }, 1000);
  }

  // Inisialisasi: render soal acak dan start timer
  renderQuestions();
  startTimer();
  document.getElementById("submitBtn").addEventListener("click", calculateScore);

  // Ketika refresh (F5) sudah melakukan reload total, maka semua state ter-reset -> soal acak ulang karena renderQuestions dipanggil saat load.
  // Tapi perlu dipastikan bahwa event handler setelah refresh juga tetap aktif.
  window.addEventListener('load', () => {
    // re-attach apapun sudah dilakukan di renderQuestions
  });
</script>
</body>
</html>
